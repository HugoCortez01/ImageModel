<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Classificador IA - Hugo Luiz Silva Cortez</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
    <style>
        body { background-color: #f0f2f5; font-family: 'Segoe UI', sans-serif; }
        
        /* Barra de Identificação do Usuário */
        .user-header-bar {
            background: #212529;
            color: #fff;
            padding: 8px 0;
            font-size: 0.85rem;
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        .main-container { max-width: 900px; margin: auto; }

        #webcam-container {
            position: relative; width: 100%; max-width: 400px; margin: auto;
            border-radius: 15px; overflow: hidden; box-shadow: 0 10px 30px rgba(0,0,0,0.15);
            background-color: #000; aspect-ratio: 1 / 1; display: flex;
            align-items: center; justify-content: center;
        }

        #webcam-container canvas {
            width: 100% !important; height: 100% !important;
            object-fit: cover; transform: scaleX(-1);
        }

        .btn-camera {
            background: linear-gradient(145deg, #0d6efd, #0b5ed7);
            color: white; border: none; padding: 12px 30px; border-radius: 50px;
            font-weight: 600; text-transform: uppercase; letter-spacing: 1px;
            box-shadow: 5px 5px 15px rgba(13, 110, 253, 0.3); transition: all 0.3s ease;
        }

        .btn-camera:hover:not(:disabled) {
            transform: translateY(-2px); box-shadow: 7px 7px 20px rgba(13, 110, 253, 0.4);
        }

        .result-item {
            background-color: white; border-radius: 10px; padding: 15px;
            margin-bottom: 10px; box-shadow: 0 2px 5px rgba(0,0,0,0.05);
        }

        .progress-container {
            height: 12px; background-color: #e9ecef; border-radius: 6px;
            overflow: hidden; position: relative;
        }

        .progress-bar-fill {
            height: 100%; background: linear-gradient(90deg, #0d6efd 0%, #0dcaf0 100%);
            width: 0%; transition: width 0.1s linear;
        }
    </style>
</head>
<body>

<!-- Barra com o nome solicitado -->
<div class="user-header-bar mb-4 shadow-sm">
    <div class="container d-flex justify-content-between align-items-center">
        <span><i class="bi bi-person-circle me-2"></i>Desenvolvedor</span>
        <span class="fw-bold">Hugo Luiz Silva Cortez</span>
    </div>
</div>

<div class="container main-container">
    <header class="text-center mb-5">
        <h1 class="display-5 fw-bold text-dark">Classificador <span class="text-primary">IA</span></h1>
        <p class="lead text-muted">Projeto de Visão Computacional</p>
    </header>

    <div class="row g-4">
        <div class="col-md-5 text-center">
            <div class="card shadow-sm border-0 p-3 mb-4">
                <div id="webcam-container">
                    <div id="camera-placeholder" class="text-muted p-4">
                        <i class="bi bi-camera-video-fill d-block mb-2" style="font-size: 2rem;"></i>
                        Aguardando permissão...
                    </div>
                </div>
            </div>
            <button class="btn btn-camera btn-lg w-100 mb-3" type="button" onclick="init()" id="start-btn">
                <i class="bi bi-power me-2"></i>Ativar Câmera
            </button>
        </div>

        <div class="col-md-7">
            <div class="card shadow-sm border-0">
                <div class="card-header bg-white border-0 pt-4">
                    <h5 class="card-title fw-bold">Predições do Modelo</h5>
                </div>
                <div class="card-body">
                    <div id="label-container">
                        <div class="text-center text-muted py-5" id="waiting-results">
                            Ative a câmera para iniciar a análise.
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <footer class="text-center mt-5 pt-4 border-top text-muted pb-4">
        <small>&copy; 2026 Hugo Luiz Silva Cortez - Deploy via GitHub Pages</small>
    </footer>
</div>

<script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@latest/dist/tf.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@teachablemachine/image@latest/dist/teachablemachine-image.min.js"></script>

<script type="text/javascript">
    const URL = "./my_model/";
    let model, webcam, labelContainer, maxPredictions;

    async function init() {
        const startBtn = document.getElementById("start-btn");
        startBtn.disabled = true;
        startBtn.innerHTML = '<span class="spinner-border spinner-border-sm me-2"></span>Iniciando...';
        
        try {
            model = await tmImage.load(URL + "model.json", URL + "metadata.json");
            maxPredictions = model.getTotalClasses();

            webcam = new tmImage.Webcam(400, 400, true); 
            await webcam.setup(); 
            await webcam.play();
            window.requestAnimationFrame(loop);

            document.getElementById("camera-placeholder").style.display = "none";
            startBtn.innerHTML = '<i class="bi bi-check-circle-fill me-2"></i>Sistema Ativo';
            startBtn.classList.replace("btn-camera", "btn-success");
            document.getElementById("waiting-results").style.display = "none";

            document.getElementById("webcam-container").appendChild(webcam.canvas);
            labelContainer = document.getElementById("label-container");
            labelContainer.innerHTML = "";
            
            for (let i = 0; i < maxPredictions; i++) {
                labelContainer.innerHTML += `
                    <div class="result-item">
                        <div class="d-flex justify-content-between mb-1">
                            <span class="fw-bold small text-uppercase" id="label-text-${i}">---</span>
                            <span class="text-primary fw-bold" id="label-prob-${i}">0%</span>
                        </div>
                        <div class="progress-container">
                            <div class="progress-bar-fill" id="bar-${i}" style="width: 0%"></div>
                        </div>
                    </div>`;
            }
        } catch (error) {
            alert("Erro: Verifique a permissão da câmera e se os arquivos do modelo estão na pasta 'my_model'.");
            startBtn.disabled = false;
            startBtn.innerText = "Tentar Novamente";
        }
    }

    async function loop() {
        webcam.update(); 
        await predict();
        window.requestAnimationFrame(loop);
    }

    async function predict() {
        const prediction = await model.predict(webcam.canvas);
        for (let i = 0; i < maxPredictions; i++) {
            const prob = (prediction[i].probability * 100).toFixed(0);
            document.getElementById(`label-text-${i}`).innerText = prediction[i].className;
            document.getElementById(`label-prob-${i}`).innerText = prob + "%";
            document.getElementById(`bar-${i}`).style.width = prob + "%";
        }
    }
</script>
</body>
</html>
